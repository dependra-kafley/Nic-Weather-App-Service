server:
  servlet:
    # Served at https://<host>/weather/ behind the relief portal reverse proxy.
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/weather}
  forward-headers-strategy: framework

spring:
  thymeleaf:
    cache: true
  h2:
    console:
      enabled: false

weather:
  imd:
    nowcast:
      mock: false
    rainfall:
      mock: false
    district-warning:
      mock: false
    city:
      mock: false
    aws-data:
      mock: false

logging:
  level:
    root: WARN
    com.example.weathermap: INFO
