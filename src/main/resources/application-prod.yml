server:
  servlet:
    # Served at https://<host>/weather/ behind the relief portal reverse proxy.
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:}
  forward-headers-strategy: framework

spring:
  thymeleaf:
    cache: true
  h2:
    console:
      enabled: false
  datasource:
    # Stored under Tomcat (catalina.base) when WEATHER_DB_PATH is not set — no Tomcat env config required.
    url: jdbc:h2:file:${WEATHER_DB_PATH:${catalina.base:./data}/weather-data/weather-db};DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE

weather:
  imd:
    nowcast:
      mock: false
    rainfall:
      mock: false
    district-warning:
      mock: false
    city:
      mock: false
    aws-data:
      mock: false

logging:
  level:
    root: WARN
    com.example.weathermap: INFO
