spring:
  profiles:
    active: local
  datasource:
    url: jdbc:h2:mem:weather-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

weather:
  imd:
    nowcast:
      mock: true
    rainfall:
      mock: true
    district-warning:
      mock: true
    city:
      mock: true
    aws-data:
      mock: true
    scheduler:
      enabled: false
